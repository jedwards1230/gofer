# Advisory visual-capture lane: on PRs that touch the TUI or its VHS tapes,
# render every vhs/*.tape headlessly and surface the frames INLINE in the PR —
# so TUI changes can be reviewed by eye without pulling the branch.
#
# Frames are published to an orphan `vhs-captures` branch under pr-<n>/<sha>/,
# embedded via raw.githubusercontent URLs in the job summary and a sticky PR
# comment. This is NOT a required check (own file, never gates merge). Fork PRs
# get a read-only token, so they degrade to an artifact upload instead of a
# push+comment.
name: VHS capture
run-name: VHS capture · PR #${{ github.event.pull_request.number }}

on:
  pull_request:
    paths:
      - internal/tui/**
      - vhs/**
      - scripts/tui-vhs.sh
      - .github/workflows/vhs-capture.yml

# One run per PR; a newer push cancels the older render so orphan-branch pushes
# for the same PR never race each other.
concurrency:
  group: vhs-capture-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write # push rendered frames to the vhs-captures orphan branch
  pull-requests: write # maintain the sticky capture comment

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      PR: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      # Empty `path` = install-only: pulls vhs + its ttyd/ffmpeg deps + fonts
      # and exports CI=''/COLORTERM=truecolor (needed for true-color frames),
      # without rendering — we drive rendering through scripts/tui-vhs.sh below.
      - uses: charmbracelet/vhs-action@59641cdc7fadf3978db65eb8c6937ea2752f4ec3 # v2.1.0

      # Glob the tapes (no hardcoded list) and reuse the repo's own renderer,
      # which prebuilds vhs/.bin/harness then renders each tape to vhs/out/.
      - name: Render VHS tapes
        run: |
          set -euo pipefail
          shopt -s nullglob
          tapes=()
          for tape in vhs/*.tape; do
            tapes+=("$(basename "$tape" .tape)")
          done
          if [ ${#tapes[@]} -eq 0 ]; then
            echo "no vhs/*.tape files found" >&2
            exit 1
          fi
          echo "rendering tapes: ${tapes[*]}"
          scripts/tui-vhs.sh "${tapes[@]}"
          echo "--- rendered ---"
          ls -1 vhs/out/

      # Always upload the raw frames+gifs: the only way fork PRs can see them,
      # and a backup for same-repo runs.
      - name: Upload frames artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: vhs-frames
          path: vhs/out/
          if-no-files-found: error

      # Publish PNG frames to the orphan vhs-captures branch under a per-PR dir,
      # overwriting the dir each run so it stays bounded. Same-repo PRs only
      # (fork tokens are read-only). Retries to tolerate cross-PR push races.
      - name: Publish frames to vhs-captures branch
        if: env.SAME_REPO == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          pngs=(vhs/out/*.png)
          if [ ${#pngs[@]} -eq 0 ]; then
            echo "no PNG frames to publish" >&2
            exit 1
          fi
          n=0
          until [ "$n" -ge 5 ]; do
            work="$(mktemp -d)"
            git -C "$work" init -q
            git -C "$work" remote add origin \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            if git -C "$work" fetch -q origin vhs-captures; then
              git -C "$work" checkout -q -B vhs-captures FETCH_HEAD
            else
              echo "vhs-captures branch absent — bootstrapping orphan"
              git -C "$work" checkout -q --orphan vhs-captures
            fi
            # Replace this PR's dir wholesale (drops stale per-sha subdirs).
            rm -rf "${work:?}/pr-${PR}"
            mkdir -p "$work/pr-${PR}/${HEAD_SHA}"
            cp "${pngs[@]}" "$work/pr-${PR}/${HEAD_SHA}/"
            git -C "$work" add -A "pr-${PR}"
            if git -C "$work" diff --cached --quiet; then
              echo "no frame changes to commit"
              rm -rf "$work"
              break
            fi
            git -C "$work" \
              -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -q -m "vhs: PR #${PR} @ ${HEAD_SHA}"
            if git -C "$work" push -q origin vhs-captures; then
              echo "pushed frames for PR #${PR} @ ${HEAD_SHA}"
              rm -rf "$work"
              break
            fi
            echo "push rejected (concurrent update?) — retrying"
            rm -rf "$work"
            n=$((n + 1))
            sleep $(((RANDOM % 4) + 2))
          done
          if [ "$n" -ge 5 ]; then
            echo "failed to publish frames after retries" >&2
            exit 1
          fi

      # Build the shared markdown (step summary + sticky comment) from whatever
      # PNGs were rendered — no hardcoded frame names.
      - name: Compose capture markdown
        if: env.SAME_REPO == 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/vhs-captures/pr-${PR}/${HEAD_SHA}"
          short="${HEAD_SHA:0:7}"
          {
            echo "### TUI visual capture"
            echo
            echo "Rendered VHS frames for commit \`${short}\`. Advisory only — this lane is **not** a required check."
            echo
            for f in vhs/out/*.png; do
              name="$(basename "$f")"
              echo "**${name}**"
              echo
              echo "![${name}](${raw_base}/${name})"
              echo
            done
            echo "<sub>Frames live on the \`vhs-captures\` branch under \`pr-${PR}/${HEAD_SHA}/\`. Regenerated on each push to this PR.</sub>"
          } > body.md
          cat body.md >> "$GITHUB_STEP_SUMMARY"

      # Find-and-update a single marker comment; never spam a new one per push.
      - name: Upsert sticky PR comment
        if: env.SAME_REPO == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          marker='<!-- vhs-capture-bot -->'
          { printf '%s\n\n' "$marker"; cat body.md; } > comment.md
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" --paginate \
            -q "[.[] | select(.body | contains(\"$marker\")) | .id] | first // empty")"
          if [ -n "$existing" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" \
              -F body=@comment.md >/dev/null
            echo "updated sticky comment ${existing}"
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" \
              -F body=@comment.md >/dev/null
            echo "created sticky comment"
          fi

      # Fork PRs can't push or comment (read-only token): point reviewers at the
      # uploaded artifact so the job still succeeds and stays useful.
      - name: Fork notice (artifact-only)
        if: env.SAME_REPO != 'true'
        run: |
          {
            echo "### TUI visual capture"
            echo
            echo "This PR is from a fork, so the token is read-only — frames can't be"
            echo "pushed to the capture branch or posted as a comment."
            echo
            echo "Rendered frames are attached to this run as the **vhs-frames** artifact."
          } >> "$GITHUB_STEP_SUMMARY"
