# Advisory visual-capture lane: on PRs that touch the TUI or its VHS tapes,
# render every vhs/*.tape headlessly and commit the PNG key-frames so TUI
# changes are reviewable as a native GitHub image diff against main — without
# pulling the branch.
#
# Rendered PNGs are committed to a per-PR, append-only capture branch
# `vhs-captures-pr-<n>`, branched from `main` so `main...vhs-captures-pr-<n>`
# is a clean image-only diff. One commit is appended per render (stable SHAs),
# and a single sticky PR comment indexes them: a "latest" image-diff link, a
# per-commit table with frame-change counts, and a collapsed <details> preview
# of the latest frames (served from the capture branch). The human PR branch
# stays clean — no image blobs committed to it.
#
# This is NOT a required check (own file, never gates merge). Fork PRs get a
# read-only token, so they degrade to an artifact upload instead of a
# push+comment. The tracked `main` baseline is maintained by vhs-baseline.yml.
name: VHS capture
run-name: VHS capture · PR #${{ github.event.pull_request.number }}

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - internal/tui/**
      - vhs/**
      - scripts/tui-vhs.sh
      - .github/workflows/vhs-capture.yml
      - .github/actions/render-vhs/**

# One run per PR; a newer push cancels the older render so capture-branch pushes
# for the same PR never race each other.
concurrency:
  group: vhs-capture-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write # append rendered frames to the per-PR capture branch
  pull-requests: write # maintain the sticky capture comment

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      PR: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      CAP_BRANCH: vhs-captures-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Drop the baseline PNGs inherited from the checkout so the publish step
      # ships exactly what THIS render produced — a tape deleted by the PR
      # must not resurface via its stale checked-out frame.
      - name: Clear inherited baseline frames
        run: rm -f vhs/snapshots/*.png

      # Install VHS, render every tape to vhs/out/, sync PNGs to vhs/snapshots/.
      - uses: ./.github/actions/render-vhs

      # Always upload the raw frames+gifs: the only way fork PRs can see them,
      # and a backup (incl. the motion GIFs) for same-repo runs.
      - name: Upload frames artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vhs-frames
          path: vhs/out/
          if-no-files-found: error

      # Append this render's PNGs to the per-PR capture branch (branched from
      # main on first render, appended to thereafter), then build the sticky
      # comment body from the branch's commit history. Same-repo PRs only
      # (fork tokens are read-only). Retries to tolerate cross-PR push races.
      - name: Maintain capture branch and compose comment
        if: env.SAME_REPO == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          pngs=("$GITHUB_WORKSPACE"/vhs/snapshots/*.png)
          if [ ${#pngs[@]} -eq 0 ]; then
            echo "no snapshot PNGs to publish" >&2
            exit 1
          fi

          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          git -C "$work" init -q
          git -C "$work" remote add origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Explicit refspec so refs/remotes/origin/main exists for the base
          # checkout and the origin/main..cap rev-list below.
          git -C "$work" fetch -q origin '+refs/heads/main:refs/remotes/origin/main'

          n=0
          until [ "$n" -ge 5 ]; do
            # Base on the existing capture-branch tip (append), else branch from
            # main so the branch carries the committed baseline as its parent.
            if git -C "$work" fetch -q origin "$CAP_BRANCH"; then
              git -C "$work" checkout -q -B cap FETCH_HEAD
            else
              git -C "$work" checkout -q -B cap origin/main
            fi
            # Replace the snapshot dir wholesale so a removed tape drops its PNG.
            rm -rf "${work:?}/vhs/snapshots"
            mkdir -p "$work/vhs/snapshots"
            cp "${pngs[@]}" "$work/vhs/snapshots/"
            git -C "$work" add -A vhs/snapshots
            if git -C "$work" diff --cached --quiet; then
              echo "no frame changes vs capture-branch tip"
              break
            fi
            git -C "$work" \
              -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -q -m "vhs: PR #${PR} render @ ${HEAD_SHA:0:7}"
            if git -C "$work" push -q origin "cap:refs/heads/${CAP_BRANCH}"; then
              echo "appended frames for PR #${PR} @ ${HEAD_SHA:0:7}"
              break
            fi
            echo "push rejected (concurrent update?) — retrying"
            n=$((n + 1))
            sleep $(((RANDOM % 4) + 2))
          done
          if [ "$n" -ge 5 ]; then
            echo "failed to publish frames after retries" >&2
            exit 1
          fi

          # Compose the sticky comment from the capture branch's history: the
          # snapshot commits are exactly those in cap but not in main.
          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          compare_url="${repo_url}/compare/main...${CAP_BRANCH}"
          mapfile -t commits < <(git -C "$work" rev-list origin/main..cap)

          if [ ${#commits[@]} -eq 0 ]; then
            {
              echo "### TUI visual capture"
              echo
              echo "No TUI visual changes detected versus the \`main\` snapshot baseline for \`${HEAD_SHA:0:7}\`. Advisory lane — nothing to review here."
            } > body.md
          else
            latest="${commits[0]}"
            tree_url="${repo_url}/tree/${latest}/vhs/snapshots"
            {
              echo "### TUI visual capture"
              echo
              echo "${#commits[@]} render(s) on \`${CAP_BRANCH}\` (branched from \`main\`). Advisory only — this lane is **not** a required check."
              echo
              echo "**Latest:** [🖼️ image diff vs \`main\`](${compare_url}) · [browse frames](${tree_url})"
              echo
              echo "| Render | When (UTC) | Frames |"
              echo "| --- | --- | --- |"
              for sha in "${commits[@]}"; do
                short="${sha:0:7}"
                when="$(TZ=UTC git -C "$work" show -s --format='%cd' --date=format-local:'%Y-%m-%d %H:%M' "$sha")"
                stats="$(git -C "$work" show --name-status --format= "$sha" -- vhs/snapshots || true)"
                a="$(grep -c '^A' <<<"$stats" || true)"
                m="$(grep -c '^M' <<<"$stats" || true)"
                d="$(grep -c '^D' <<<"$stats" || true)"
                parts=()
                [ "$m" -gt 0 ] && parts+=("${m} changed")
                [ "$a" -gt 0 ] && parts+=("${a} added")
                [ "$d" -gt 0 ] && parts+=("${d} removed")
                [ ${#parts[@]} -eq 0 ] && parts+=("no frame changes")
                frames="$(printf '%s, ' "${parts[@]}")"; frames="${frames%, }"
                echo "| [\`${short}\`](${repo_url}/commit/${sha}) | ${when} | ${frames} |"
              done
              echo
              # Inline preview of the latest batch, collapsed by default so the
              # PR stays compact. Images render from the committed PNGs on the
              # capture branch (raw.githubusercontent at the latest commit SHA)
              # — nothing lands on the PR branch itself. An agent fetching the
              # comment body still loads the ![](…) images inside the details.
              raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${latest}/vhs/snapshots"
              echo "<details>"
              echo "<summary>🎞️ Latest frames — <code>${latest:0:7}</code> (${#pngs[@]})</summary>"
              echo
              while IFS= read -r name; do
                echo "**${name}**"
                echo
                echo "![${name}](${raw_base}/${name})"
                echo
              done < <(printf '%s\n' "${pngs[@]##*/}" | sort)
              echo "</details>"
              echo
              echo "<sub>Frames are committed PNGs on \`${CAP_BRANCH}\` (motion GIFs stay CI artifacts). Diff any commit against \`main\` for a side-by-side. Regenerated on each push; the branch is deleted when the PR closes.</sub>"
            } > body.md
          fi
          cat body.md >> "$GITHUB_STEP_SUMMARY"

      # Find-and-update a single marker comment; never spam a new one per push.
      - name: Upsert sticky PR comment
        if: env.SAME_REPO == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          marker='<!-- vhs-capture-bot -->'
          { printf '%s\n\n' "$marker"; cat body.md; } > comment.md
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" --paginate \
            -q "[.[] | select(.body | contains(\"$marker\")) | .id] | first // empty")"
          if [ -n "$existing" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" \
              -F body=@comment.md >/dev/null
            echo "updated sticky comment ${existing}"
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" \
              -F body=@comment.md >/dev/null
            echo "created sticky comment"
          fi

      # Fork PRs can't push or comment (read-only token): point reviewers at the
      # uploaded artifact so the job still succeeds and stays useful.
      - name: Fork notice (artifact-only)
        if: env.SAME_REPO != 'true'
        run: |
          {
            echo "### TUI visual capture"
            echo
            echo "This PR is from a fork, so the token is read-only — frames can't be"
            echo "committed to a capture branch or posted as a comment."
            echo
            echo "Rendered frames are attached to this run as the **vhs-frames** artifact."
          } >> "$GITHUB_STEP_SUMMARY"
