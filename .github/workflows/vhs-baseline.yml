# Maintains the tracked TUI snapshot baseline on `main`. On any push to main
# that changes the TUI render inputs (the TUI itself, a tape, the harness, or
# the renderer), this re-renders every vhs/*.tape and commits the updated PNG
# key-frames to vhs/snapshots/. That keeps `main` carrying the current frames,
# so a feature PR's capture branch (vhs-capture.yml) diffs against an accurate
# baseline and merging a feature advances the baseline.
#
# The main ruleset requires changes via pull request, so the refresh lands as
# a bot PR that is merged immediately by the workflow: the ruleset needs zero
# approvals and only thread resolution (a fresh bot PR has none), and PRs
# created/merged with GITHUB_TOKEN trigger no further workflow runs — so this
# never re-triggers itself (nor release/CI/the PR review bot). The path filter
# also excludes vhs/snapshots/** as a second guard. Not a required check; run
# it by hand (workflow_dispatch) to seed the baseline the first time. If a
# future ruleset change blocks the instant merge (e.g. required checks), the
# PR is left open for a human and the run still succeeds.
name: VHS baseline
run-name: VHS baseline · ${{ github.sha }}

on:
  push:
    branches: [main]
    paths:
      - internal/tui/**
      - vhs/*.tape
      - vhs/harness/**
      - scripts/tui-vhs.sh
      - .github/workflows/vhs-baseline.yml
      - .github/actions/render-vhs/**
  workflow_dispatch:

concurrency:
  group: vhs-baseline
  cancel-in-progress: true

permissions:
  contents: write # push the refresh branch
  pull-requests: write # open + merge the refresh PR

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Start from an empty baseline so a deleted tape's stale PNG becomes a
      # tracked deletion instead of lingering on main forever (the renderer's
      # --snapshot only copies frames in, it never removes).
      - name: Clear stale baseline frames
        run: rm -f vhs/snapshots/*.png

      # Install VHS, render every tape to vhs/out/, sync PNGs to vhs/snapshots/.
      - uses: ./.github/actions/render-vhs

      - name: Open and merge refresh PR if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git add -A vhs/snapshots
          if git diff --cached --quiet; then
            echo "baseline already current — nothing to commit"
            echo "TUI snapshot baseline already current." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git \
            -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -q -m "vhs: refresh snapshot baseline @ ${GITHUB_SHA:0:7}"
          # The main ruleset forbids direct pushes, so land the refresh via a
          # bot PR merged on the spot. Force-push the bot-only branch: each
          # refresh supersedes any stale leftover wholesale.
          branch="vhs-baseline-refresh"
          git push -q -f origin "HEAD:refs/heads/${branch}"
          # set -e makes a gh failure here abort the run (the assignment
          # propagates the substitution's exit code) — an API error can't fall
          # through into creating a duplicate PR.
          pr="$(gh pr list --head "$branch" --state open --json number -q '.[0].number // empty')"
          if [ -z "$pr" ]; then
            gh pr create --base main --head "$branch" \
              --title "vhs: refresh snapshot baseline @ ${GITHUB_SHA:0:7}" \
              --body "Automated TUI snapshot-baseline refresh (vhs-baseline.yml). CI-rendered PNGs only." \
              >/dev/null
            # gh pr create has no --json output; resolve the number robustly
            # instead of string-parsing the printed URL.
            pr="$(gh pr view "$branch" --json number -q .number)"
          fi
          # Mergeability takes a moment to compute after the push; retry
          # briefly, keeping the last error for the failure report.
          n=0
          until merge_err="$(gh pr merge "$pr" --squash --delete-branch 2>&1)"; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "could not merge refresh PR #${pr} automatically — leaving it open" >&2
              echo "last merge error: ${merge_err}" >&2
              echo "Baseline refresh PR [#${pr}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/${pr}) could not be auto-merged — needs a human. Last error: \`${merge_err}\`" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            sleep 5
          done
          echo "Refreshed TUI snapshot baseline on \`main\` via PR #${pr}." >> "$GITHUB_STEP_SUMMARY"
          git show --stat --format= >> "$GITHUB_STEP_SUMMARY"
