# CI: fast build/vet/test + lint on every PR, plus the race detector on every
# PR and on push (merges to main and release tags). gofer is a concurrency-heavy
# repo — its whole subject is many per-session OS processes — so a data race is
# a first-class defect that must block a PR, not merely a release. Running -race
# on the PR lane costs extra CI minutes but is the correct trade for this repo;
# do not gate it back to push-only without restoring PR-time race coverage some
# other way.
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      # Type-check the build-tagged worker-fleet benchmark. Nothing else in CI
      # compiles it (that is the point of the tag), so without this it can rot
      # silently and stop being runnable at the commit its baseline names.
      - run: go vet -tags workerbench ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: go test -race ./...
