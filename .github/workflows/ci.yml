# CI: fast build/vet/test + lint on every PR, plus the race detector on every
# PR and on push (merges to main and release tags). gofer is a concurrency-heavy
# repo — its whole subject is many per-session OS processes — so a data race is
# a first-class defect that must block a PR, not merely a release. Running -race
# on the PR lane costs extra CI minutes but is the correct trade for this repo;
# do not gate it back to push-only without restoring PR-time race coverage some
# other way.
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      # Type-check the build-tagged worker-fleet benchmark. Nothing else in CI
      # compiles it (that is the point of the tag), so without this it can rot
      # silently and stop being runnable at the commit its baseline names.
      - run: go vet -tags workerbench ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11
          # A restored analysis cache loses staticcheck's noreturn fact for
          # testing.T.Fatal, so SA5011 fires on every `if p == nil { t.Fatal(...) }`
          # in whichever packages that run happens to re-analyze — pre-existing
          # test files no commit touched. A fully warm cache hides it (results are
          # reused) and a genuinely cold run is clean; only the partial restore is
          # wrong, which is why it surfaces as a PR that "breaks" untouched files.
          # There are ~45 such sites across the repo, so annotating them is
          # unbounded whack-a-mole and excluding SA5011 in tests would give up a
          # real check. Analyzing from cold costs ~1-2min and is always correct.
          skip-cache: true

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - run: go test -race ./...
