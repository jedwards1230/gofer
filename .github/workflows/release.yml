# Release gofer on push to main. Opt-in via a semver:* label on the merged PR
# (no label -> no release). The detect job reads the label, the shared
# jedwards1230/release-workflows/ai-release.yml computes the version/tag and AI
# release notes (create_release: false), then build cross-compiles static
# binaries from the tagged ref and the release job publishes the GitHub Release
# with the binaries + AI body.
#
# Single-file, push-triggered shape (modeled on anyctl's release.yml): a
# push-triggered workflow calling the remote reusable directly avoids the
# local-reusable-calls-remote-reusable startup validation failure.
#
# The git tag is the single source of truth for the version: build stamps it
# into the binary via -ldflags, reading the version the reusable computed.
name: Release

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
      && format('Release: {0}{1}', inputs.dry_run && 'dry-run ' || '', inputs.bump_type)
      || format('Release: {0}', github.event.head_commit.message || github.sha)
  }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: "Compute version + preview notes without tagging or publishing"
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  # ai-release.yml@v1 reads merged PRs for the changelog, and the detect job
  # below runs `gh pr list` -- both need pull-requests:read. Without it the
  # reusable call fails GitHub's startup validation ("requesting
  # 'pull-requests: read', but only allowed 'pull-requests: none'"). A
  # restricted permissions block defaults every unlisted scope to none.
  pull-requests: read

jobs:
  detect:
    name: Detect bump type
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.bump.outputs.type }}
      release: ${{ steps.bump.outputs.release }}
      dry_run: ${{ steps.bump.outputs.dry_run }}
    steps:
      - name: Determine bump type
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Resolve TYPE / RELEASE / DRY into shell vars, then write all three
          # outputs in one grouped redirect at the end (shellcheck SC2129).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPE="${{ inputs.bump_type }}"; RELEASE="true"; DRY="${{ inputs.dry_run }}"
          else
            # push event: opt-in via the merged PR's semver:* label. No label -> no release.
            # Retry -- the GitHub API may not have the merge commit indexed the
            # instant the push event fires.
            LABELS=""
            for attempt in 1 2 3; do
              LABELS=$(gh pr list --state merged --base main --limit 100 \
                --json labels,mergeCommit \
                | jq -r --arg sha "$GITHUB_SHA" \
                  '.[] | select(.mergeCommit.oid == $sha) | .labels[].name' 2>/dev/null || echo "")
              [ -n "$LABELS" ] && break
              echo "Attempt ${attempt}: no labels for ${GITHUB_SHA}, retrying in 5s..."
              sleep 5
            done
            echo "Labels: ${LABELS:-<none>}"

            DRY="false"
            if echo "$LABELS" | grep -q 'semver:major'; then
              TYPE="major"; RELEASE="true"
            elif echo "$LABELS" | grep -q 'semver:minor'; then
              TYPE="minor"; RELEASE="true"
            elif echo "$LABELS" | grep -q 'semver:patch'; then
              TYPE="patch"; RELEASE="true"
            else
              echo "::notice::No semver:* label -- skipping release."
              TYPE="none"; RELEASE="false"
            fi
          fi

          {
            echo "type=$TYPE"
            echo "release=$RELEASE"
            echo "dry_run=$DRY"
          } >> "$GITHUB_OUTPUT"

  prepare:
    name: Tag & Generate Notes
    needs: [detect]
    if: needs.detect.outputs.release == 'true'
    uses: jedwards1230/release-workflows/.github/workflows/ai-release.yml@v1
    with:
      service_name: gofer
      service_description: "a daemon + TUI for running and supervising many coding agents on the agent-sdk-go contract"
      bump_type: ${{ needs.detect.outputs.bump_type }}
      create_release: false
      dry_run: ${{ needs.detect.outputs.dry_run == 'true' }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  build:
    name: Build binaries
    needs: [detect, prepare]
    if: needs.detect.outputs.release == 'true' && needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          out="gofer-${GOOS}-${GOARCH}"
          # The git tag is the single source of truth; stamp the computed version
          # into the binary so `gofer version` matches the release.
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$out" ./cmd/gofer
          sha256sum "$out" > "$out.sha256"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: gofer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            gofer-${{ matrix.goos }}-${{ matrix.goarch }}
            gofer-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  release:
    name: Create GitHub Release
    needs: [detect, prepare, build]
    if: needs.detect.outputs.release == 'true' && needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          path: dist
          merge-multiple: true

      - name: Generate aggregate SHA256SUMS
        working-directory: dist
        run: |
          set -euo pipefail
          # One checksum manifest over the release binaries only -- exclude the
          # per-asset *.sha256 files.
          find . -maxdepth 1 -type f -name 'gofer-*' ! -name '*.sha256' -printf '%P\n' \
            | sort | xargs sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Compose release body (install snippet + AI notes)
        env:
          BODY_B64: ${{ needs.prepare.outputs.release_body }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          # ai-release.yml emits a base64-encoded body to survive GitHub Actions'
          # job-output character restrictions; decode before use.
          echo "$BODY_B64" | base64 -d > /tmp/ai_body.md
          {
            echo "## Install"
            echo ""
            echo '```bash'
            echo "go install github.com/jedwards1230/gofer/cmd/gofer@${VERSION}"
            echo '```'
            echo ""
            echo "Or download a static binary for your platform below (verify against \`SHA256SUMS\`)."
            echo ""
            echo "---"
            echo ""
          } > /tmp/release_body.md
          cat /tmp/ai_body.md >> /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.version }}
          body_path: /tmp/release_body.md
          files: dist/*
          make_latest: true

      - name: Write summary
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUMP_TYPE: ${{ needs.detect.outputs.bump_type }}
        run: |
          {
            echo "## Release ${TAG}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | ${VERSION} |"
            echo "| Bump | ${BUMP_TYPE} |"
          } >> "$GITHUB_STEP_SUMMARY"
